services:
  database:
    image: mariadb:10.4
    container_name: documentalgps-db
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: documentosgps
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - documentalgps-network

  ms-auth:
    build:
      context: ./ms-auth
      dockerfile: Dockerfile
    container_name: documentalgps-ms-auth
    environment:
      PORT: 3001
      DB_HOST: database
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: documentosgps
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      database:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - documentalgps-network

  ms-mantenedores:
    build:
      context: ./ms-mantenedores
      dockerfile: Dockerfile
    container_name: documentalgps-ms-mantenedores
    environment:
      PORT: 3002
      DB_HOST: database
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: documentosgps
    depends_on:
      database:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - documentalgps-network

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: documentalgps-gateway
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8033:3000"
    depends_on:
      - ms-auth
      - ms-mantenedores
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - documentalgps-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://pacheco.chillan.ubiobio.cl:8033
    container_name: documentalgps-frontend
    ports:
      - "8032:3000"
    depends_on:
      - gateway
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - documentalgps-network

volumes:
  db_data:

networks:
  documentalgps-network:
    driver: bridge