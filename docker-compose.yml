services:
  database:
    image: mariadb:10.4
    container_name: documentalgps-db
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: documentosgps
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - documentalgps-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: documentalgps-backend
    environment:
      PORT: 3001
      DB_HOST: database
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: documentosgps
      JWT_SECRET: ${JWT_SECRET}
      NODE_OPTIONS: --max-old-space-size=256
    ports:
      - "8033:3001"
    depends_on:
      database:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - documentalgps-network

  frontend:
  build:
    context: ./frontend
    dockerfile: Dockerfile
    args:
      - REACT_APP_API_URL=http://pacheco.chillan.ubiobio.cl:8033
  container_name: documentalgps-frontend
  ports:
    - "8032:3000"
  depends_on:
    - backend
  deploy:
    resources:
      limits:
        memory: 300M
  networks:
    - documentalgps-network

volumes:
  db_data:

networks:
  documentalgps-network:
    driver: bridge