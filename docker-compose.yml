version: '3.8'

services:
  # Base de Datos (MySQL 8)
  db:
    image: mysql:8
    container_name: documentosgps-db
    restart: always
    environment:
      MYSQL_DATABASE: documentosgps
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - ./database/documentosgps.sql:/docker-entrypoint-initdb.d/setup.sql
      - db_data:/var/lib/mysql 
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (Node.js + Express)
  backend:
    build: ./backend
    container_name: documentosgps-backend
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=
      - DB_NAME=documentosgps
    depends_on:
      db: 
        condition: service_healthy

  # Frontend (React)
  frontend:
    build: ./frontend
    container_name: documentosgps-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:3001
    depends_on:
      - backend

volumes:
  db_data: