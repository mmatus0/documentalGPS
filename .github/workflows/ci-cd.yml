name: Pipeline (CI/CD)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  security-scan:
    name: Escáner de Vulnerabilidades (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3

  test-and-build:
    name: Pruebas de Calidad
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Lint Frontend
        working-directory: ./frontend
        continue-on-error: true
        run: |
          npm install
          npm run lint
      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
      - name: Instalar dependencias ms-auth
        working-directory: ./ms-auth
        run: npm install
      - name: Ejecutar tests ms-auth
        working-directory: ./ms-auth
        run: npm test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
      - name: Instalar dependencias ms-mantenedores
        working-directory: ./ms-mantenedores
        run: npm install
      - name: Ejecutar tests ms-mantenedores
        working-directory: ./ms-mantenedores
        run: npm test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
      - name: Instalar dependencias gateway
        working-directory: ./gateway
        run: npm install
      - name: Ejecutar tests gateway
        working-directory: ./gateway
        run: npx jest --forceExit --detectOpenHandles
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
      - name: Subir cobertura ms-auth a Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ms-auth/coverage/lcov.info
          flags: ms-auth
          name: ms-auth
      - name: Subir cobertura ms-mantenedores a Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ms-mantenedores/coverage/lcov.info
          flags: ms-mantenedores
          name: ms-mantenedores
      - name: Subir cobertura gateway a Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: gateway/coverage/lcov.info
          flags: gateway
          name: gateway

  deploy-to-pacheco:
    name: Desplegar en Pacheco
    needs: [test-and-build, security-scan]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Conectar y desplegar en Pacheco
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PACHECO_HOST }}
          username: ${{ secrets.PACHECO_USERNAME }}
          key: ${{ secrets.PACHECO_SSH_KEY }}
          script: |
            cd ~/documentalGPS
            git pull origin main
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" > .env
            docker-compose down --remove-orphans
            docker system prune -f
            docker-compose up -d --build
            docker image prune -a -f