name: Pipeline (CI/CD)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  security-scan:
    name: Escáner de Vulnerabilidades (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3

  test-and-build:
    name: Pruebas de Calidad
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Instalar dependencias ms-auth
        working-directory: ./ms-auth
        run: npm install

      - name: Ejecutar tests ms-auth
        working-directory: ./ms-auth
        run: npm test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Instalar dependencias ms-mantenedores
        working-directory: ./ms-mantenedores
        run: npm install

      - name: Ejecutar tests ms-mantenedores
        working-directory: ./ms-mantenedores
        run: npm test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Subir reporte de cobertura ms-auth
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-ms-auth
          path: ms-auth/coverage/lcov.info

      - name: Subir reporte de cobertura ms-mantenedores
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-ms-mantenedores
          path: ms-mantenedores/coverage/lcov.info

  sonarcloud:
    name: Análisis SonarCloud
    needs: test-and-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependencias y generar cobertura ms-auth
        working-directory: ./ms-auth
        run: |
          npm install
          npm test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Instalar dependencias y generar cobertura ms-mantenedores
        working-directory: ./ms-mantenedores
        run: |
          npm install
          npm test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Análisis SonarCloud
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-to-pacheco:
    name: Desplegar en Pacheco
    needs: [test-and-build, security-scan]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Conectar y desplegar en Pacheco
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PACHECO_HOST }}
          username: ${{ secrets.PACHECO_USERNAME }}
          key: ${{ secrets.PACHECO_SSH_KEY }}
          script: |
            cd ~/documentalGPS
            git pull origin main
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" > .env
            docker-compose down
            docker system prune -f
            docker-compose up -d --build
            docker image prune -a -f