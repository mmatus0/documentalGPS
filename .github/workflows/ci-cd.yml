name: Pipeline (CI/CD)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # Etapa 1a: Seguridad (codeQL)
  # ==========================================
  security-scan:
    name: Escáner de Vulnerabilidades (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Ejecutar análisis CodeQL
        uses: github/codeql-action/analyze@v3

  # ==========================================
  # Etapa 1B: Integración continua (Build + Pruebas)
  # ==========================================
  test-and-build:
    name: Pruebas de Calidad
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Instalar dependencias Backend
        working-directory: ./backend
        run: npm install

      - name: Ejecutar tests Backend
        working-directory: ./backend
        run: npm test

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/lcov.info

  # ==========================================
  # Etapa 2: Analisis de código en SonarCloud
  # ==========================================
  sonarcloud:
    name: Análisis SonarCloud
    needs: test-and-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependencias y generar cobertura
        working-directory: ./backend
        run: |
          npm install
          npm test

      - name: Análisis SonarCloud
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # Etapa 3: Despliegue continuo en Pacheco (CD)
  # ==========================================
  deploy-to-pacheco:
    name: Desplegar en Pacheco
    needs: [test-and-build, sonarcloud, security-scan]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Conectar y desplegar en Pacheco
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PACHECO_HOST }}
          username: ${{ secrets.PACHECO_USERNAME }}
          key: ${{ secrets.PACHECO_SSH_KEY }}
          script: |
            cd ~/documentalGPS
            git pull origin main
            docker-compose down
            docker system prune -f
            docker-compose up -d --build
            docker image prune -a -f